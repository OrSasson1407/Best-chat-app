server {
    listen 80;
    
    # Enable Gzip compression to drastically reduce React bundle sizes
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # THIS IS THE MAGIC LINE: 
        # It tells Nginx "If you can't find the file, just serve index.html" to handle React Router
        try_files $uri $uri/ /index.html; 
    }

    # Cache static assets (images, CSS, JS) for 1 year to improve load times
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}