name: Chat App CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test ${{ matrix.directory }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory: [client, server]
    
    defaults:
      run:
        working-directory: ./${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # ✅ FIX 1: Upgraded to Node 20 to match your Dockerfiles and Vite 6 requirements
          node-version: '20.x' 
          cache: 'npm'
          cache-dependency-path: ./${{ matrix.directory }}/package-lock.json
          
      - name: Install Dependencies
        # ✅ FIX 2: Conditionally use --legacy-peer-deps for the client to prevent React 19 conflicts
        run: |
          if [ "${{ matrix.directory }}" == "client" ]; then
            npm ci --legacy-peer-deps
          else
            npm ci
          fi
        
      - name: Build Client
        if: matrix.directory == 'client'
        run: npm run build
        
      # - name: Run Tests
      #   run: npm test

  docker-build-check:
    name: Verify Docker Builds
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test Server Docker Build
        run: docker build -t chat-server-test ./server
        
      - name: Test Client Docker Build
        run: docker build -t chat-client-test ./client