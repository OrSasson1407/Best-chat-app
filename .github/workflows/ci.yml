name: Chat App CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# ✅ FIX 1: This environment variable silences the Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ✅ FIX 2: Split the Client into its own job so we can safely use --legacy-peer-deps
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Client
        run: npm run build

  # ✅ FIX 3: Keep the Server job standard
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json
      - name: Install Dependencies
        run: npm ci

  docker-build-check:
    name: Verify Docker Builds
    needs: [build-client, build-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Server Docker Build
        run: docker build -t chat-server-test ./server
      - name: Test Client Docker Build
        run: docker build -t chat-client-test ./client